<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV Player</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
<style>
:root {
  --bg: #090b0f;
  --s1: #10141c;
  --s2: #161b26;
  --border: #1e2535;
  --accent: #00e5ff;
  --red: #ff3d5a;
  --green: #00e676;
  --text: #dde4f0;
  --muted: #4a5568;
  --r: 7px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden;}

header{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(–s1);border-bottom:1px solid var(–border);flex-shrink:0;flex-wrap:wrap;}
.logo{font-size:1rem;font-weight:800;letter-spacing:2px;color:var(–accent);white-space:nowrap;margin-right:4px;}
.logo em{color:var(–red);font-style:normal;}
.ver{font-size:0.6rem;color:var(–muted);font-weight:400;letter-spacing:1px;}
.btn{font-size:0.72rem;padding:6px 13px;border-radius:var(–r);border:1px solid var(–border);background:var(–s2);color:var(–text);cursor:pointer;white-space:nowrap;transition:all .15s;}
.btn:hover{border-color:var(–accent);color:var(–accent);}
.btn.pri{background:var(–accent);color:#000;border-color:var(–accent);font-weight:700;}
.btn.pri:hover{background:#00bcd4;}
.btn.dan{border-color:var(–red);color:var(–red);}
.btn.dan:hover{background:var(–red);color:#fff;}

#errBar{display:none;background:var(–red);color:#fff;font-size:0.72rem;padding:6px 14px;font-family:monospace;flex-shrink:0;}

.main{display:flex;flex:1;overflow:hidden;}

.sidebar{width:290px;min-width:200px;background:var(–s1);border-right:1px solid var(–border);display:flex;flex-direction:column;flex-shrink:0;}
.tabs{display:flex;border-bottom:1px solid var(–border);}
.tab{flex:1;padding:9px 4px;font-size:0.7rem;font-weight:700;text-align:center;cursor:pointer;color:var(–muted);border-bottom:2px solid transparent;transition:all .15s;}
.tab.on{color:var(–accent);border-bottom-color:var(–accent);}
.search{padding:7px 9px;border-bottom:1px solid var(–border);}
.search input{width:100%;font-size:0.75rem;padding:6px 10px;background:var(–s2);border:1px solid var(–border);border-radius:var(–r);color:var(–text);outline:none;}
.search input:focus{border-color:var(–accent);}
.cats{display:flex;gap:5px;padding:6px 9px;overflow-x:auto;border-bottom:1px solid var(–border);scrollbar-width:none;flex-shrink:0;}
.pill{font-size:0.63rem;padding:3px 10px;border-radius:20px;border:1px solid var(–border);background:var(–s2);color:var(–muted);cursor:pointer;white-space:nowrap;transition:all .15s;}
.pill.on{background:var(–accent);color:#000;border-color:var(–accent);font-weight:700;}
.chlist{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(–border) transparent;}
.chi{display:flex;align-items:center;gap:9px;padding:7px 11px;cursor:pointer;border-bottom:1px solid #131720;transition:background .1s;}
.chi:hover{background:var(–s2);}
.chi.on{background:#001a20;border-left:3px solid var(–accent);}
.chi-logo{width:34px;height:34px;border-radius:5px;object-fit:contain;background:var(–s2);border:1px solid var(–border);flex-shrink:0;}
.chi-ph{width:34px;height:34px;border-radius:5px;background:var(–s2);border:1px solid var(–border);display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0;}
.chi-info{flex:1;min-width:0;}
.chi-name{font-size:0.8rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chi-grp{font-size:0.63rem;color:var(–muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chi-fav{font-size:.95rem;color:var(–muted);cursor:pointer;padding:2px 4px;flex-shrink:0;transition:color .15s;}
.chi-fav:hover,.chi-fav.on{color:#ffd600;}
.empty{padding:36px 18px;text-align:center;color:var(–muted);font-size:.82rem;line-height:1.8;}
.empty span{font-size:2.2rem;display:block;margin-bottom:10px;}
.loadmore{padding:10px;text-align:center;}
.chcount{padding:7px;text-align:center;font-size:0.63rem;color:var(–muted);font-family:monospace;}

.player{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#000;}
.vwrap{position:relative;flex:1;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden;}
video{width:100%;height:100%;object-fit:contain;display:none;}
.nosig{display:flex;flex-direction:column;align-items:center;gap:10px;color:var(–muted);}
.nosig span{font-size:3rem;opacity:.35;}
.nosig p{font-size:.82rem;}
.badge{position:absolute;top:12px;left:12px;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);padding:5px 13px;border-radius:20px;font-size:.78rem;font-weight:700;border:1px solid rgba(255,255,255,.1);display:none;align-items:center;gap:7px;}
.badge.on{display:flex;}
.dot{width:7px;height:7px;border-radius:50%;background:var(–green);animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}

.errlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,.88);flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:20px;text-align:center;z-index:10;}
.errlay.on{display:flex;}
.errlay .etitle{font-size:1rem;font-weight:700;color:var(–red);}
.errlay .emsg{font-family:monospace;font-size:.72rem;color:var(–text);line-height:1.6;word-break:break-all;max-width:420px;}
.errlay .eurl{font-family:monospace;font-size:.6rem;color:var(–muted);word-break:break-all;max-width:420px;}

.pinfo{padding:9px 13px;background:var(–s1);border-top:1px solid var(–border);display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap;}
.nowplay{flex:1;min-width:0;}
.nowplay .lbl{font-size:.6rem;color:var(–muted);letter-spacing:1px;}
.nowplay .ttl{font-size:.95rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nowplay .grp{font-size:.7rem;color:var(–accent);}
.pctrls{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
#streamSt{font-family:monospace;font-size:.62rem;color:var(–muted);}

.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:100;align-items:center;justify-content:center;padding:16px;}
.mbg.on{display:flex;}
.modal{background:var(–s1);border:1px solid var(–border);border-radius:12px;width:100%;max-width:520px;padding:24px;display:flex;flex-direction:column;gap:14px;max-height:90dvh;overflow-y:auto;}
.modal h2{font-size:1rem;font-weight:800;color:var(–accent);}
.modal label{font-size:.75rem;font-weight:600;display:block;margin-bottom:3px;}
.modal input,.modal textarea{width:100%;font-size:.72rem;padding:7px 11px;background:var(–bg);border:1px solid var(–border);border-radius:var(–r);color:var(–text);outline:none;font-family:monospace;}
.modal input[type=file]{font-family:inherit;}
.modal input:focus,.modal textarea:focus{border-color:var(–accent);}
.modal textarea{height:100px;resize:vertical;}
.mact{display:flex;gap:8px;justify-content:flex-end;}
hr.div{border:none;border-top:1px solid var(–border);}

.logbox{background:#000;border:1px solid var(–accent);border-radius:var(–r);padding:10px;font-family:monospace;font-size:.73rem;color:#e0e6f0;height:110px;overflow-y:auto;white-space:pre-wrap;word-break:break-word;resize:vertical;}
.logbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.progwrap{margin-top:6px;background:var(–s2);border-radius:4px;height:5px;overflow:hidden;}
.progbar{height:100%;width:0%;background:var(–accent);transition:width .35s;border-radius:4px;}
.progbytes{margin-top:3px;font-family:monospace;font-size:.62rem;color:var(–muted);}

#toast{position:fixed;bottom:20px;right:20px;background:var(–s2);border:1px solid var(–accent);color:var(–accent);padding:9px 16px;border-radius:var(–r);font-size:.78rem;opacity:0;transform:translateY(8px);transition:all .22s;z-index:200;pointer-events:none;font-family:monospace;}
#toast.on{opacity:1;transform:translateY(0);}

@media(max-width:600px){
.main{flex-direction:column;}
.sidebar{width:100%;height:44%;border-right:none;border-bottom:1px solid var(–border);}
.player{height:56%;}
}
</style>

</head>
<body>

<header>
  <div class="logo">IPTV<em>●</em>PLAY <span class="ver">v3.0</span></div>
  <button class="btn pri" id="btnOpenImport">📂 Importar M3U</button>
  <button class="btn" id="btnOpenAdd">➕ Canal Manual</button>
  <button class="btn" id="btnExport">💾 Exportar</button>
  <button class="btn dan" id="btnClear">🗑 Limpar</button>
</header>
<div id="errBar"></div>

<div class="main">
  <div class="sidebar">
    <div class="tabs">
      <div class="tab on" id="tabAll">TODOS</div>
      <div class="tab" id="tabFav">⭐ FAVORITOS</div>
    </div>
    <div class="search"><input type="text" id="searchInput" placeholder="Buscar canal..."></div>
    <div class="cats" id="catsBar"></div>
    <div class="chlist" id="chList"></div>
  </div>

  <div class="player">
    <div class="vwrap" id="vwrap">
      <div class="nosig" id="nosig"><span>📺</span><p>Selecione um canal</p></div>
      <video id="vid" controls></video>
      <div class="badge" id="badge"><div class="dot"></div><span id="badgeTxt"></span></div>
      <div class="errlay" id="errlay">
        <div style="font-size:2rem">🔴</div>
        <div class="etitle" id="etitle"></div>
        <div class="emsg" id="emsg"></div>
        <div class="eurl" id="eurl"></div>
        <button class="btn" id="btnCloseErr">Fechar</button>
      </div>
    </div>
    <div class="pinfo">
      <div class="nowplay">
        <div class="lbl">AO VIVO</div>
        <div class="ttl" id="nowTtl">Nenhum canal</div>
        <div class="grp" id="nowGrp">—</div>
      </div>
      <div class="pctrls">
        <span id="streamSt"></span>
        <button class="btn" id="btnPrev">⏮</button>
        <button class="btn" id="btnNext">⏭</button>
        <button class="btn" id="btnFS">⛶ Tela Cheia</button>
        <button class="btn" id="btnPiP">⧉ PiP</button>
        <button class="btn" id="btnCopyUrl">🔗 URL</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL IMPORTAR -->

<div class="mbg" id="modalImport">
  <div class="modal">
    <h2>📂 Importar Lista M3U</h2>
    <hr class="div">
    <div>
      <label>📁 Arquivo .m3u do dispositivo</label>
      <input type="file" id="inFile" accept=".m3u,.m3u8,.txt">
    </div>
    <hr class="div">
    <div>
      <label>🌐 URL da lista M3U</label>
      <input type="url" id="inUrl" placeholder="http://servidor.com/lista.m3u">
    </div>
    <div>
      <label>📋 Ou cole o conteúdo M3U</label>
      <textarea id="inText" placeholder="#EXTM3U..."></textarea>
    </div>
    <div class="mact">
      <button class="btn" id="btnCancelImport">Cancelar</button>
      <button class="btn pri" id="btnDoImport">Importar</button>
    </div>
    <div>
      <div class="logbar">
        <label style="margin:0">Log</label>
        <button class="btn" id="btnClearLog" style="padding:2px 9px;font-size:.62rem;">Limpar</button>
      </div>
      <div class="logbox" id="logBox"></div>
      <div class="progwrap"><div class="progbar" id="progBar"></div></div>
      <div class="progbytes" id="progBytes"></div>
    </div>
  </div>
</div>

<!-- MODAL CANAL MANUAL -->

<div class="mbg" id="modalAdd">
  <div class="modal">
    <h2>➕ Adicionar Canal</h2>
    <div><label>Nome</label><input type="text" id="inName" placeholder="Globo HD"></div>
    <div><label>URL do stream</label><input type="url" id="inChUrl" placeholder="http://..."></div>
    <div><label>Grupo</label><input type="text" id="inGrp" placeholder="Abertos"></div>
    <div><label>Logo (URL, opcional)</label><input type="url" id="inLogo" placeholder="http://...logo.png"></div>
    <div class="mact">
      <button class="btn" id="btnCancelAdd">Cancelar</button>
      <button class="btn pri" id="btnDoAdd">Adicionar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
'use strict';

window.onerror = function(msg, src, line) {
  var b = document.getElementById('errBar');
  if (b) { b.textContent = 'JS ERRO linha ' + line + ': ' + msg; b.style.display = 'block'; }
};

// STATE
var channels  = [];
var favorites = new Set();
var idxMap    = {};
var activeIdx = -1;
var curTab    = 'all';
var curCat    = 'Todos';
var curPage   = 1;
var PAGE      = 80;
var hlsInst   = null;

try { channels  = JSON.parse(localStorage.getItem('iptv_ch')  || '[]'); } catch(e){ channels = []; }
try { favorites = new Set(JSON.parse(localStorage.getItem('iptv_fav') || '[]')); } catch(e){ favorites = new Set(); }

function save() {
  try { localStorage.setItem('iptv_fav', JSON.stringify(Array.from(favorites))); } catch(e){}
  try {
    var s = channels.length > 5000 ? channels.slice(0,5000) : channels;
    localStorage.setItem('iptv_ch', JSON.stringify(s));
  } catch(e){ try{ localStorage.removeItem('iptv_ch'); }catch(e2){} }
}

function buildIdxMap() {
  idxMap = {};
  for (var i = 0; i < channels.length; i++) idxMap[channels[i].id] = i;
}

// TOAST
var toastTmr;
function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('on');
  clearTimeout(toastTmr);
  toastTmr = setTimeout(function(){ t.classList.remove('on'); }, 2800);
}

// MODAL
function openModal(id) { document.getElementById(id).classList.add('on'); }
function closeModal(id) { document.getElementById(id).classList.remove('on'); }

document.getElementById('btnOpenImport').addEventListener('click', function(){ openModal('modalImport'); });
document.getElementById('btnCancelImport').addEventListener('click', function(){ closeModal('modalImport'); });
document.getElementById('btnOpenAdd').addEventListener('click', function(){ openModal('modalAdd'); });
document.getElementById('btnCancelAdd').addEventListener('click', function(){ closeModal('modalAdd'); });

document.querySelectorAll('.mbg').forEach(function(m){
  m.addEventListener('click', function(e){ if(e.target===m) closeModal(m.id); });
});

// LOG
function log(msg) {
  var b = document.getElementById('logBox');
  b.textContent += (b.textContent ? '\n' : '') + msg;
  b.scrollTop = b.scrollHeight;
}
function setBar(p) { document.getElementById('progBar').style.width = p + '%'; }
function setBytes(t) { document.getElementById('progBytes').textContent = t; }
function fmtBytes(n) {
  if (n < 1024) return n + ' B';
  if (n < 1048576) return (n/1024).toFixed(1) + ' KB';
  return (n/1048576).toFixed(2) + ' MB';
}
document.getElementById('btnClearLog').addEventListener('click', function(){
  document.getElementById('logBox').textContent = ''; setBar(0); setBytes('');
});

// PARSE M3U
async function parseM3U(text) {
  var lines = text.split('\n');
  var list = []; var cur = {};
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].trim();
    if (!line) continue;
    if (line.indexOf('#EXTINF') === 0) {
      cur = {};
      var nm = line.match(/tvg-name="([^"]*)"/);
      if (nm) cur.name = nm[1];
      var lg = line.match(/tvg-logo="([^"]*)"/);
      if (lg) cur.logo = lg[1];
      var gr = line.match(/group-title="([^"]*)"/);
      cur.group = gr ? gr[1] : 'Sem Grupo';
      if (!cur.name) { var ci = line.lastIndexOf(','); if (ci>=0) cur.name = line.slice(ci+1).trim(); }
    } else if (line.indexOf('#') !== 0 && line.length > 4) {
      if (cur.name) list.push({ id: Math.random().toString(36).slice(2), name: cur.name, url: line, group: cur.group||'Sem Grupo', logo: cur.logo||'' });
      cur = {};
    }
    if (i % 5000 === 0 && i > 0) { log('  processando... ' + list.length + ' canais'); await new Promise(function(r){ setTimeout(r,0); }); }
  }
  return list;
}

// FETCH WITH PROXIES
async function fetchWithProxies(url) {
  var proxies = [
    function(u){ return u; },
    function(u){ return 'https://corsproxy.io/?' + encodeURIComponent(u); },
    function(u){ return 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u); },
    function(u){ return 'https://proxy.cors.sh/' + u; }
  ];
  var labels = ['direto','corsproxy.io','allorigins.win','proxy.cors.sh'];
  for (var i = 0; i < proxies.length; i++) {
    log('[' + (i+1) + '/4] Tentando via ' + labels[i] + '...');
    setBar(10 + i*20);
    try {
      var ctrl = new AbortController();
      var timer = setTimeout(function(){ ctrl.abort(); }, 15000);
      var resp = await fetch(proxies[i](url), { signal: ctrl.signal });
      clearTimeout(timer);
      if (!resp.ok) { log('  X HTTP ' + resp.status); continue; }
      var text = await resp.text();
      if (text.indexOf('#EXTM3U') < 0 && text.indexOf('#EXTINF') < 0) { log('  X Resposta nao e M3U'); continue; }
      log('  OK — ' + fmtBytes(text.length));
      return text;
    } catch(e) {
      var m = e.message||'';
      if (m.indexOf('520')>=0) m='HTTP 520 — servidor fora do ar';
      else if (m.indexOf('abort')>=0) m='Timeout (15s)';
      else if (m.indexOf('Load failed')>=0||m.indexOf('Failed to fetch')>=0) m='Bloqueado (CORS/HTTPS)';
      log('  X ' + m);
    }
  }
  return null;
}

// IMPORT
document.getElementById('btnDoImport').addEventListener('click', async function() {
  var btn = this;
  var fileEl = document.getElementById('inFile');
  var urlVal = document.getElementById('inUrl').value.trim();
  var txtVal = document.getElementById('inText').value.trim();
  document.getElementById('logBox').textContent = '';
  setBar(0); setBytes('');
  btn.disabled = true; btn.textContent = 'Aguarde...';
  var parsed = [];
  try {
    if (fileEl.files && fileEl.files.length > 0) {
      var file = fileEl.files[0];
      log('Lendo: ' + file.name + ' (' + fmtBytes(file.size) + ')');
      var text = await file.text();
      if (text.indexOf('#EXTM3U') < 0 && text.indexOf('#EXTINF') < 0) { log('X Arquivo invalido'); btn.disabled=false; btn.textContent='Importar'; return; }
      setBar(40);
      parsed = await parseM3U(text);
      log('OK: ' + parsed.length.toLocaleString() + ' canais');
      setBar(100); setBytes(fmtBytes(file.size) + ' lidos');
    } else if (urlVal) {
      var txt2 = await fetchWithProxies(urlVal);
      if (!txt2) { log('\nTodos os metodos falharam.\nBaixe o .m3u e use a opcao Arquivo.'); btn.disabled=false; btn.textContent='Importar'; return; }
      setBar(70);
      parsed = await parseM3U(txt2);
      log('OK: ' + parsed.length.toLocaleString() + ' canais');
      setBar(100);
    } else if (txtVal) {
      log('Processando conteudo colado...');
      parsed = await parseM3U(txtVal);
      log('OK: ' + parsed.length.toLocaleString() + ' canais');
      setBar(100);
    } else {
      toast('Selecione arquivo, URL ou cole o conteudo.');
      btn.disabled=false; btn.textContent='Importar'; return;
    }
    if (!parsed.length) { log('Nenhum canal encontrado.'); btn.disabled=false; btn.textContent='Importar'; return; }
    log('Adicionando ' + parsed.length.toLocaleString() + ' canais...');
    await new Promise(function(r){ setTimeout(r,0); });
    channels = channels.concat(parsed);
    buildIdxMap(); save();
    curPage=1; curCat='Todos';
    log('Renderizando...');
    await new Promise(function(r){ setTimeout(r,0); });
    renderCats(); renderList();
    log('Pronto!');
    fileEl.value=''; document.getElementById('inUrl').value=''; document.getElementById('inText').value='';
    setTimeout(function(){ closeModal('modalImport'); toast(parsed.length.toLocaleString() + ' canais importados!'); }, 900);
  } catch(err) { log('ERRO: ' + err.message); }
  btn.disabled=false; btn.textContent='Importar';
});

try { document.getElementById('inUrl').value = localStorage.getItem('iptv_lasturl') || ''; } catch(e){}
document.getElementById('inUrl').addEventListener('input', function(){ try{ localStorage.setItem('iptv_lasturl', this.value); }catch(e){} });

// ADD MANUAL
document.getElementById('btnDoAdd').addEventListener('click', function(){
  var name = document.getElementById('inName').value.trim();
  var url  = document.getElementById('inChUrl').value.trim();
  var grp  = document.getElementById('inGrp').value.trim() || 'Manual';
  var logo = document.getElementById('inLogo').value.trim();
  if (!name||!url) { toast('Nome e URL obrigatorios.'); return; }
  channels.push({ id: Math.random().toString(36).slice(2), name:name, url:url, group:grp, logo:logo });
  buildIdxMap(); save(); renderCats(); renderList();
  ['inName','inChUrl','inGrp','inLogo'].forEach(function(id){ document.getElementById(id).value=''; });
  closeModal('modalAdd'); toast('Canal adicionado!');
});

// EXPORT
document.getElementById('btnExport').addEventListener('click', function(){
  if (!channels.length) { toast('Nenhum canal.'); return; }
  var c = '#EXTM3U\n';
  for (var i=0;i<channels.length;i++) {
    var ch=channels[i];
    c += '#EXTINF:-1 tvg-name="'+ch.name+'" tvg-logo="'+(ch.logo||'')+'" group-title="'+(ch.group||'')+'",'+ch.name+'\n'+ch.url+'\n';
  }
  var a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([c],{type:'application/x-mpegurl'}));
  a.download='lista.m3u'; a.click(); toast('Exportado!');
});

// CLEAR
document.getElementById('btnClear').addEventListener('click', function(){
  if (!confirm('Remover todos os canais?')) return;
  channels=[]; favorites=new Set(); idxMap={}; activeIdx=-1;
  save(); renderCats(); renderList(); stopPlayer(); toast('Lista limpa.');
});

// CATEGORIES
function renderCats() {
  var set = {}; set['Todos'] = true;
  for (var i=0;i<channels.length;i++) set[channels[i].group||'Sem Grupo']=true;
  var all = Object.keys(set).sort(function(a,b){ return a==='Todos'?-1:b==='Todos'?1:a.localeCompare(b); });
  var bar = document.getElementById('catsBar');
  bar.innerHTML = all.map(function(c){
    return '<div class="pill'+(c===curCat?' on':'')+'" data-cat="'+c.replace(/"/g,'&quot;')+'">'+c+'</div>';
  }).join('');
  bar.querySelectorAll('.pill').forEach(function(p){
    p.addEventListener('click', function(){ curCat=this.dataset.cat; curPage=1; renderCats(); renderList(); });
  });
}

// TABS
document.getElementById('tabAll').addEventListener('click', function(){
  curTab='all'; curPage=1;
  document.getElementById('tabAll').classList.add('on');
  document.getElementById('tabFav').classList.remove('on');
  renderList();
});
document.getElementById('tabFav').addEventListener('click', function(){
  curTab='fav'; curPage=1;
  document.getElementById('tabFav').classList.add('on');
  document.getElementById('tabAll').classList.remove('on');
  renderList();
});

// SEARCH
document.getElementById('searchInput').addEventListener('input', function(){ curPage=1; renderList(); });

// FILTER
function getFiltered() {
  var q = document.getElementById('searchInput').value.toLowerCase().trim();
  return channels.filter(function(ch){
    if (curTab==='fav' && !favorites.has(ch.id)) return false;
    if (curCat!=='Todos' && ch.group!==curCat) return false;
    if (q && ch.name.toLowerCase().indexOf(q)<0 && (ch.group||'').toLowerCase().indexOf(q)<0) return false;
    return true;
  });
}

// RENDER LIST
function renderList() {
  var list = document.getElementById('chList');
  var filtered = getFiltered();
  var total = filtered.length;
  if (!total) { list.innerHTML='<div class="empty"><span>🔍</span>Nenhum canal encontrado.</div>'; return; }
  var slice = filtered.slice(0, curPage * PAGE);
  var hasMore = slice.length < total;
  var html = '';
  for (var i=0;i<slice.length;i++) {
    var ch=slice[i];
    var ri = idxMap.hasOwnProperty(ch.id) ? idxMap[ch.id] : -1;
    var isOn = ri===activeIdx;
    var isFav = favorites.has(ch.id);
    var logo = ch.logo
      ? '<img class="chi-logo" src="'+ch.logo+'" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\'"><div class="chi-ph" style="display:none">📺</div>'
      : '<div class="chi-ph">📺</div>';
    html += '<div class="chi'+(isOn?' on':'')+'" data-idx="'+ri+'">'
      +logo
      +'<div class="chi-info"><div class="chi-name">'+ch.name+'</div><div class="chi-grp">'+(ch.group||'Sem Grupo')+'</div></div>'
      +'<div class="chi-fav'+(isFav?' on':'')+'" data-id="'+ch.id+'">★</div>'
      +'</div>';
  }
  list.innerHTML = html;
  list.querySelectorAll('.chi').forEach(function(el){
    el.addEventListener('click', function(e){
      if (e.target.classList.contains('chi-fav')) return;
      var idx = parseInt(this.dataset.idx);
      if (idx>=0) playChannel(idx);
    });
  });
  list.querySelectorAll('.chi-fav').forEach(function(el){
    el.addEventListener('click', function(e){
      e.stopPropagation();
      var id = this.dataset.id;
      if (favorites.has(id)) favorites.delete(id); else favorites.add(id);
      save(); renderList();
    });
  });
  if (hasMore) {
    var div = document.createElement('div');
    div.className='loadmore';
    var b = document.createElement('button');
    b.className='btn'; b.style.width='100%';
    b.textContent='▼ Carregar mais ('+slice.length+' de '+total.toLocaleString()+')';
    b.addEventListener('click', function(){ var st=list.scrollTop; curPage++; renderList(); list.scrollTop=st; });
    div.appendChild(b); list.appendChild(div);
  } else {
    var info = document.createElement('div');
    info.className='chcount'; info.textContent=total.toLocaleString()+' canais';
    list.appendChild(info);
  }
}

// PLAYER
function destroyHls() { if (hlsInst) { hlsInst.destroy(); hlsInst=null; } }

function showErr(title, msg, url) {
  document.getElementById('etitle').textContent = title;
  document.getElementById('emsg').textContent   = msg;
  document.getElementById('eurl').textContent   = url||'';
  document.getElementById('errlay').classList.add('on');
}
function hideErr() { document.getElementById('errlay').classList.remove('on'); }
document.getElementById('btnCloseErr').addEventListener('click', hideErr);

function setSt(txt, color) {
  var el = document.getElementById('streamSt');
  el.textContent=txt; el.style.color=color||'var(--muted)';
}

function playChannel(idx) {
  if (idx<0||idx>=channels.length) return;
  activeIdx=idx;
  var ch=channels[idx];
  var vid=document.getElementById('vid');
  destroyHls(); hideErr();
  document.getElementById('nosig').style.display='none';
  vid.style.display='block';
  setSt('Conectando...','var(--muted)');
  var url=ch.url;

  if (vid.canPlayType('application/vnd.apple.mpegurl')) {
    vid.src=url; vid.load();
    vid.play().catch(function(e){ showErr('Bloqueado',e.message,url); });
    setSt('HLS nativo','var(--green)');
  } else if (typeof Hls !== 'undefined' && Hls.isSupported()) {
    hlsInst = new Hls({ enableWorker:true, lowLatencyMode:true });
    hlsInst.loadSource(url);
    hlsInst.attachMedia(vid);
    hlsInst.on(Hls.Events.MANIFEST_PARSED, function(){
      vid.play().catch(function(e){ showErr('Bloqueado',e.message,url); });
      setSt('HLS hls.js','var(--green)');
    });
    hlsInst.on(Hls.Events.ERROR, function(ev,data){
      if (data.fatal) { showErr('Erro HLS',data.type+' / '+data.details,url); destroyHls(); }
    });
  } else {
    vid.src=url; vid.load();
    vid.play().catch(function(e){ showErr('Bloqueado',e.message,url); });
    setSt('Direto','var(--green)');
  }

  vid.onerror = function(){
    var codes=['','ABORTED','NETWORK','DECODE','SRC_NOT_SUPPORTED'];
    var code = vid.error ? (codes[vid.error.code]||String(vid.error.code)) : '?';
    var msg  = vid.error ? vid.error.message : 'Erro desconhecido';
    showErr('Erro de midia: '+code, msg, url);
    setSt(code,'var(--red)');
  };

  document.getElementById('badgeTxt').textContent=ch.name;
  var badge=document.getElementById('badge');
  badge.classList.add('on');
  setTimeout(function(){ badge.classList.remove('on'); },4000);
  document.getElementById('nowTtl').textContent=ch.name;
  document.getElementById('nowGrp').textContent=ch.group||'—';
  renderList();
}

function stopPlayer() {
  destroyHls();
  var vid=document.getElementById('vid');
  vid.pause(); vid.src=''; vid.style.display='none';
  document.getElementById('nosig').style.display='flex';
  document.getElementById('nowTtl').textContent='Nenhum canal';
  document.getElementById('nowGrp').textContent='—';
  setSt('','');
}

function navChannel(dir) {
  var f=getFiltered(); if (!f.length) return;
  var cur=channels[activeIdx];
  var fi=f.indexOf(cur);
  if (fi<0) fi=0;
  var ni=(fi+dir+f.length)%f.length;
  var nidx=idxMap.hasOwnProperty(f[ni].id)?idxMap[f[ni].id]:-1;
  if (nidx>=0) playChannel(nidx);
}

document.getElementById('btnPrev').addEventListener('click', function(){ navChannel(-1); });
document.getElementById('btnNext').addEventListener('click', function(){ navChannel(1); });

document.getElementById('btnFS').addEventListener('click', function(){
  var w=document.getElementById('vwrap');
  if (!document.fullscreenElement) w.requestFullscreen().catch(function(){ document.getElementById('vid').requestFullscreen().catch(function(){}); });
  else document.exitFullscreen();
});

document.getElementById('btnPiP').addEventListener('click', async function(){
  var vid=document.getElementById('vid');
  if (!document.pictureInPictureEnabled) { toast('PiP nao suportado.'); return; }
  if (document.pictureInPictureElement) await document.exitPictureInPicture();
  else if (vid.src) await vid.requestPictureInPicture().catch(function(){});
});

document.getElementById('btnCopyUrl').addEventListener('click', function(){
  if (activeIdx<0) { toast('Nenhum canal ativo.'); return; }
  navigator.clipboard.writeText(channels[activeIdx].url).then(function(){ toast('URL copiada!'); });
});

document.addEventListener('keydown', function(e){
  if (['INPUT','TEXTAREA'].includes(e.target.tagName)) return;
  if (e.key==='ArrowUp') { e.preventDefault(); navChannel(-1); }
  if (e.key==='ArrowDown') { e.preventDefault(); navChannel(1); }
  if (e.key==='f'||e.key==='F') document.getElementById('btnFS').click();
});

// INIT
buildIdxMap();
renderCats();
renderList();
</script>

</body>
</html>
